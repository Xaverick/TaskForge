apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __NS__-ingress
  namespace: __NS__
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Strip /api prefix before forwarding to backend (nginx rewrite)
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Rate limiting — matches your old nginx 100req/60s setup
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Body size for uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # CORS — backend handles it, but set headers at ingress too
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  # Replace with your domain or remove tls block if no cert yet
  # tls:
  #   - hosts:
  #       - your-domain.com
  #     secretName: tls-secret
  rules:
    - host: __HOST__
      http:
        paths:
          # ── Auth API ────────────────────────────────────────────────────────
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 4000

          # ── Task API ────────────────────────────────────────────────────────
          - path: /api/tasks(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: task-service
                port:
                  number: 5000

          # ── Frontend SPA ────────────────────────────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80