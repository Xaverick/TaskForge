# ─── MongoDB Headless Service (for StatefulSet DNS) ──────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: __NS__
  labels:
    app: mongodb
spec:
  clusterIP: None          # headless — needed for StatefulSet pod DNS
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# ─── MongoDB Client Service (for app connections) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: __NS__
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# ─── MongoDB StatefulSet ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: __NS__
spec:
  serviceName: mongodb-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:7.0
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--wiredTigerCacheSizeGB"
            - "0.5"
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "cinder-sc"   # change to your cluster's StorageClass
        resources:
          requests:
            storage: 5Gi

---
# ─── MongoDB ReplicaSet Init Job ──────────────────────────────────────────────
# Run ONCE after StatefulSet pods are Ready to initialize rs0.
# Jenkins pipeline handles this automatically on first deploy.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-rs-init
  namespace: __NS__
  annotations:
    # Only apply during first install, not on updates
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: mongo:7.0
          command:
            - mongosh
            - "--host"
            - "mongodb-0.mongodb-headless.__NS__.svc.cluster.local:27017"
            - "--eval"
            - |
              rs.initiate({
                _id: "rs0",
                members: [
                  { _id: 0, host: "mongodb-0.mongodb-headless.__NS__.svc.cluster.local:27017" },
                  { _id: 1, host: "mongodb-1.mongodb-headless.__NS__.svc.cluster.local:27017" },
                  { _id: 2, host: "mongodb-2.mongodb-headless.__NS__.svc.cluster.local:27017" }
                ]
              })