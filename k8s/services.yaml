# ─── Auth Service ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: __NS__
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP

---
# ─── Task Service ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: __NS__
  labels:
    app: task-service
spec:
  selector:
    app: task-service
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP

---
# ─── Frontend ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: __NS__
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP